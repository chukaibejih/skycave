services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override datastore hosts to the compose service names
      DATABASE_URL: postgresql+asyncpg://skycave:skycave@db:5432/skycave
      REDIS_URL: redis://redis:6379/0
      # Reach the OAuth sidecar over the internal Docker network
      OAUTH_SIDECAR_URL: http://oauth-sidecar:3001
    # Bound to localhost only — nginx (on the host) is the sole public entrypoint.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # AT Protocol OAuth backend-for-frontend (PAR + DPoP + session cookie).
  oauth-sidecar:
    build: ../oauth-sidecar
    restart: unless-stopped
    env_file: ../oauth-sidecar/.env
    environment:
      PORT: 3001
      # The ES256 PEM is mounted as a file (env_file can't carry multi-line).
      OAUTH_PRIVATE_KEY_FILE: /run/secrets/oauth-private-key.pem
    volumes:
      - ./secrets/oauth-private-key.pem:/run/secrets/oauth-private-key.pem:ro
    # Localhost only — nginx proxies api.skycave.space/oauth/* here; the internal
    # /oauth/session is never routed publicly (see nginx.conf).
    ports:
      - "127.0.0.1:8001:3001"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skycave
      POSTGRES_PASSWORD: skycave
      POSTGRES_DB: skycave
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skycave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
