# Skycave API — Nginx reverse proxy for api.skycave.space
#
# Deploy on the existing DigitalOcean droplet. Place in
# /etc/nginx/sites-available/api.skycave.space and symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
#
# TLS: run `certbot --nginx -d api.skycave.space` to provision Let's Encrypt
# certs; certbot will inject the listen 443 / ssl_certificate lines. The
# block below shows the proxy + WebSocket upgrade config you must keep.

# Map handles the Connection header for WebSocket upgrades:
#   - "upgrade" when the client sends Upgrade: websocket
#   - "close"  for normal HTTP requests
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream skycave_api {
    # FastAPI container published on the droplet's localhost:8000
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream skycave_oauth {
    # OAuth sidecar published on the droplet's localhost:8001
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.skycave.space;

    # Let certbot manage the redirect to HTTPS after issuing certs.
    # Until then, this serves plain HTTP for the ACME challenge + testing.

    client_max_body_size 10m;

    # --- OAuth sidecar ---
    # The internal session-resolver must NEVER be reachable from the public web;
    # only FastAPI calls it over the Docker network. Block it explicitly first.
    location = /oauth/session {
        return 404;
    }
    # Public OAuth routes (login, callback, client-metadata.json, jwks.json).
    location /oauth/ {
        proxy_pass http://skycave_oauth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- WebSocket endpoint ---
    location /ws/ {
        proxy_pass http://skycave_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep mobile sockets alive through quiet periods (game waits).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- REST API ---
    location / {
        proxy_pass http://skycave_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
